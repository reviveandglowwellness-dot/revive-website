<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Revive &amp; Glow — Wellness Assessment</title>
<style>
:root{
  --green:#1f3d34; --green-2:#2c5347; --beige:#f4efe6; --beige-2:#ece4d5;
  --bronze:#b9863f; --bronze-2:#a5732f; --ink:#233029; --muted:#6d7a72;
  --white:#fffdf8; --danger:#b4462f; --ok:#3f7d5c; --radius:22px;
  --shadow:0 18px 50px rgba(31,61,52,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Georgia","Times New Roman",serif;
  background:radial-gradient(120% 120% at 50% 0%,var(--beige) 0%,var(--beige-2) 100%);
  color:var(--ink);overflow:hidden;position:fixed;inset:0;
}
#app{height:100%;display:flex;flex-direction:column;max-width:820px;margin:0 auto;padding:clamp(18px,4vw,42px)}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:40px}
.brand{font-size:.82rem;letter-spacing:.28em;text-transform:uppercase;color:var(--bronze);font-family:Helvetica,Arial,sans-serif;font-weight:700}
.progress-wrap{flex:1;max-width:300px;margin-left:auto}
.progress-lbl{font-family:Helvetica,Arial,sans-serif;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-align:right;margin-bottom:6px}
.progress{height:5px;border-radius:99px;background:rgba(31,61,52,.12);overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--bronze),var(--bronze-2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0}
.stage{flex:1;display:flex;flex-direction:column;justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:clamp(10px,3vh,30px) 4px calc(env(safe-area-inset-bottom,0px) + 28px);animation:fade .55s ease}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{font-family:Helvetica,Arial,sans-serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--bronze);font-weight:700;margin-bottom:14px}
h1{font-size:clamp(1.9rem,5vw,2.9rem);line-height:1.1;font-weight:400;letter-spacing:-.01em;margin-bottom:14px}
.lede{font-size:clamp(1rem,2.4vw,1.18rem);color:var(--muted);line-height:1.6;max-width:60ch;margin-bottom:26px}
.opts{display:grid;gap:12px;grid-template-columns:1fr}
.opts.two{grid-template-columns:1fr 1fr}
@media(max-width:560px){.opts.two{grid-template-columns:1fr}}
.opt{
  display:flex;align-items:center;gap:14px;text-align:left;width:100%;
  background:var(--white);border:1.5px solid rgba(31,61,52,.14);border-radius:16px;
  padding:18px 20px;font-family:inherit;font-size:1.06rem;color:var(--ink);cursor:pointer;
  transition:.18s;min-height:60px;line-height:1.3;
}
.opt:hover{border-color:var(--bronze);transform:translateY(-2px)}
.opt.sel{border-color:var(--bronze);background:linear-gradient(0deg,rgba(185,134,63,.1),rgba(185,134,63,.1)),var(--white);box-shadow:0 8px 22px rgba(185,134,63,.18)}
.opt .dot{flex:none;width:22px;height:22px;border-radius:50%;border:2px solid rgba(31,61,52,.25);display:grid;place-items:center;transition:.18s}
.opt.sel .dot{border-color:var(--bronze);background:var(--bronze)}
.opt.sel .dot::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff}
.opt.multi .dot{border-radius:6px}
.opt.big{flex-direction:column;justify-content:center;text-align:center;padding:34px 20px;font-size:1.3rem;min-height:150px;gap:10px}
.opt.big .ico{font-size:2.2rem}
.field{margin-bottom:14px}
.field label{display:block;font-family:Helvetica,Arial,sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input{width:100%;background:var(--white);border:1.5px solid rgba(31,61,52,.16);border-radius:12px;padding:15px 16px;font-family:inherit;font-size:1.05rem;color:var(--ink)}
.field input:focus{outline:none;border-color:var(--bronze)}
.check{display:flex;align-items:flex-start;gap:12px;background:var(--white);border:1.5px solid rgba(31,61,52,.14);border-radius:12px;padding:14px 16px;cursor:pointer;font-size:.95rem;color:var(--muted);line-height:1.4}
.check.sel{border-color:var(--bronze)}
.check .box{flex:none;width:22px;height:22px;border-radius:6px;border:2px solid rgba(31,61,52,.25);display:grid;place-items:center;margin-top:1px}
.check.sel .box{background:var(--bronze);border-color:var(--bronze)}
.check.sel .box::after{content:"✓";color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:.8rem}
.safety-note{background:rgba(185,134,63,.09);border-left:3px solid var(--bronze);border-radius:8px;padding:14px 16px;color:var(--muted);font-size:.95rem;line-height:1.55;margin-bottom:22px}
.nav{display:flex;gap:12px;align-items:center;margin-top:26px}
.btn{font-family:Helvetica,Arial,sans-serif;font-weight:700;letter-spacing:.04em;border:none;border-radius:99px;padding:16px 34px;font-size:.98rem;cursor:pointer;transition:.2s;min-height:56px}
.btn.primary{background:linear-gradient(180deg,var(--bronze),var(--bronze-2));color:#fff;box-shadow:0 10px 26px rgba(185,134,63,.32)}
.btn.primary:hover{transform:translateY(-2px)}
.btn.primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn.ghost{background:transparent;color:var(--muted);border:1.5px solid rgba(31,61,52,.18)}
.btn.link{background:none;color:var(--muted);padding:10px 6px;font-size:.86rem;box-shadow:none;min-height:auto}
.spacer{flex:1}
.hint{font-family:Helvetica,Arial,sans-serif;font-size:.78rem;color:var(--muted);margin-top:14px}
/* RESULT */
.res-head .eyebrow{margin-bottom:10px}
.method-cards{display:grid;gap:12px;margin:18px 0}
.mcard{background:var(--white);border:1.5px solid rgba(31,61,52,.12);border-radius:16px;padding:18px 20px;display:flex;gap:16px;align-items:flex-start;box-shadow:var(--shadow)}
.mcard .num{font-family:Helvetica,Arial,sans-serif;font-weight:800;color:var(--bronze);font-size:1.1rem;flex:none;width:34px}
.mcard h3{font-size:1.18rem;font-weight:400;margin-bottom:2px}
.mcard .mod{font-family:Helvetica,Arial,sans-serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--bronze);font-weight:700;margin-bottom:6px}
.mcard p{color:var(--muted);font-size:.96rem;line-height:1.5}
.mcard.first{border-color:var(--bronze);background:linear-gradient(0deg,rgba(185,134,63,.06),rgba(185,134,63,.06)),var(--white)}
.tag-first{font-family:Helvetica,Arial,sans-serif;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--bronze);padding:3px 9px;border-radius:99px;font-weight:700;display:inline-block;margin-bottom:8px}
.support{color:var(--muted);font-size:.98rem;line-height:1.6;margin:6px 0 14px}
.addon{background:var(--green);color:var(--beige);border-radius:16px;padding:20px 22px;margin:14px 0}
.addon h3{font-weight:400;font-size:1.15rem;margin-bottom:6px;color:#fff}
.addon p{color:rgba(244,239,230,.82);font-size:.95rem;line-height:1.55}
.member{background:linear-gradient(135deg,var(--green),var(--green-2));color:var(--beige);border-radius:20px;padding:26px;margin:18px 0;box-shadow:var(--shadow)}
.member .eyebrow{color:var(--bronze)}
.member h2{font-weight:400;font-size:1.5rem;color:#fff;margin-bottom:12px}
.member ul{list-style:none;display:grid;gap:8px;margin-bottom:14px}
.member li{padding-left:24px;position:relative;color:rgba(244,239,230,.9);font-size:1rem}
.member li::before{content:"✦";position:absolute;left:0;color:var(--bronze)}
.member .tier{background:rgba(255,253,248,.12);border:1px solid rgba(185,134,63,.4);border-radius:12px;padding:12px 16px;font-size:.98rem;color:#fff}
.tiers{display:grid;gap:10px}
.tieropt{display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(255,253,248,.08);border:1.5px solid rgba(244,239,230,.22);border-radius:12px;padding:14px 16px;cursor:pointer;color:#fff;transition:.15s;min-height:56px}
.tieropt:hover{border-color:var(--bronze)}
.tieropt.sel{border-color:var(--bronze);background:rgba(185,134,63,.22)}
.tieropt .tn{font-size:1.05rem;display:flex;align-items:center}
.tieropt .tp{font-family:Helvetica,Arial,sans-serif;font-size:.86rem;color:rgba(244,239,230,.85);text-align:right}
.tieropt .rec{font-family:Helvetica,Arial,sans-serif;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;background:var(--bronze);color:#fff;padding:2px 7px;border-radius:99px;margin-left:8px}
.assist{background:#fff;border:2px solid var(--bronze);border-radius:18px;padding:22px 24px;margin-bottom:18px}
.assist h2{font-weight:400;font-size:1.35rem;margin-bottom:8px}
.assist p{color:var(--muted);line-height:1.6}
.disc{font-family:Helvetica,Arial,sans-serif;font-size:.74rem;color:var(--muted);line-height:1.5;margin-top:16px}
/* FRONT DESK */
.desk{background:var(--ink);color:#dfe8e2;border-radius:16px;padding:22px;font-family:"SFMono-Regular",Consolas,monospace;font-size:.9rem;line-height:1.7}
.desk .row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.12)}
.desk .k{color:#8fb3a3;text-transform:uppercase;font-size:.68rem;letter-spacing:.08em}
.desk .safe{margin-top:12px;padding:12px;border-radius:10px;font-weight:700;text-align:center}
.desk .safe.ok{background:rgba(63,125,92,.25);color:#a8e6c4}
.desk .safe.alert{background:rgba(180,70,47,.28);color:#ffb9a6}
.desk .safe.warn{background:rgba(185,134,63,.28);color:#f2d9a8}
.toggle{display:flex;gap:8px;margin-top:16px;justify-content:center}
.pet{text-align:center}
.pet .emoji{font-size:3.4rem;margin-bottom:12px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="brand">Revive &amp; Glow</div>
    <div class="progress-wrap" id="pwrap" style="visibility:hidden">
      <div class="progress-lbl" id="plbl">Step 1</div>
      <div class="progress"><i id="pbar"></i></div>
    </div>
  </div>
  <div class="stage" id="stage"></div>
</div>

<script>
/* ============ CONFIG (data-driven; edite aqui — valores pendentes de assinatura de segurança) ============ */
var METHOD = {
  1:{name:"Illuminate", mod:"Red Light Therapy", benefit:"Energize cells and prime the body with red light.", modalities:["red_light"]},
  2:{name:"Restore",    mod:"Infrared Sauna",    benefit:"Warm deep, sweat clean, and release tension.",     modalities:["sauna"]},
  3:{name:"Refresh",    mod:"Cold Plunge",       benefit:"Invigorate circulation and sharpen the mind.",     modalities:["cold_plunge"]},
  4:{name:"Recover",    mod:"Compression + Vibration", benefit:"Flush fatigue from tired muscles.",           modalities:["compression","vibration"]},
  5:{name:"Rehydrate",  mod:"Grounding + Hydration",   benefit:"Ground, rest, and replenish.",                modalities:["grounding"]}
};
var GOALS = {
  goal_recovery:    {label:"Bounce back from training & sore muscles", steps:[4,3,2], support:5, pace:[2,3]},
  goal_inflammation:{label:"Ease aches, stiffness & inflammation",     steps:[3,2,1], support:5, pace:[2,2]},
  goal_energy:      {label:"More energy, less fatigue",                steps:[1,3,2], support:5, pace:[2,3]},
  goal_sleep_stress:{label:"Better sleep & less stress",               steps:[2,5,1], support:null, pace:[1,2]},
  goal_longevity:   {label:"Age well & stay ahead of it",              steps:[1,2,3,4,5], support:null, pace:[1,1], forceTier:"commit"},
  goal_skin:        {label:"Glowing skin & natural beauty",            steps:[1,2,5], support:null, pace:[2,3]}
};
// flag -> modality: "block" or "review"
var CONTRA = {
  flag_heart:{sauna:"block",cold_plunge:"block",vibration:"block",compression:"review"},
  flag_bp:{sauna:"block",cold_plunge:"block",compression:"review",vibration:"review"},
  flag_pregnant:{sauna:"block",cold_plunge:"block",vibration:"block",red_light:"review",compression:"review",hydrogen_water:"review"},
  flag_surgery:{sauna:"block",cold_plunge:"block",compression:"block",vibration:"block",red_light:"review"},
  flag_clot:{cold_plunge:"block",compression:"block",vibration:"block",sauna:"review"},
  flag_epilepsy:{cold_plunge:"block",vibration:"block",sauna:"review",red_light:"review"},
  flag_pacemaker:{sauna:"review",cold_plunge:"review",vibration:"review",grounding:"review"},
  flag_cold_sensitive:{cold_plunge:"block",compression:"review"},
  flag_photo:{red_light:"block",sauna:"review"},
  flag_illness:{sauna:"block",cold_plunge:"block",red_light:"review",compression:"review",vibration:"review"}
};
var TIERS = {
  flex:{name:"Flex",price:"$179 / 8 sessions",note:"Flexible, no long commitment"},
  commit:{name:"Commit",price:"$159 / 8 sessions (6-mo)",note:"Best value for building a habit"},
  elite:{name:"Elite",price:"$249 / 20 sessions",note:"Higher volume, lowest per-session"}
};
// ⚠️ Cole aqui os links de compra online do Mindbody por tier (quando disponíveis). Vazio = confirmação no front desk.
var MEMBERSHIP_URLS = {flex:"", commit:"", elite:""};

/* ============ SCREENS ============ */
var SCREENS = [
  {id:"intro", type:"info", noProgress:true,
   eyebrow:"AI Wellness Concierge", title:"Welcome to Revive &amp; Glow.",
   body:"Let's build your personalized Revive Method™ — the version of our five-step ritual made just for you. Takes about 90 seconds. No wrong answers.",
   cta:"Let's begin"},
  {id:"path", type:"choice", noProgress:true, branch:true,
   title:"Who are we caring for today?",
   options:[{id:"path_human",label:"Me",ico:"🧘"},{id:"path_pet",label:"My companion",ico:"🐾"}], big:true},
  {id:"q1", type:"choice", title:"Have you visited Revive &amp; Glow before?",
   options:[{id:"new",label:"I'm new here"},{id:"returning",label:"I've been here before"}]},
  {id:"q2", type:"form", title:"Where should we send your plan and progress?",
   fields:[{k:"name",label:"Full name"},{k:"email",label:"Email"},{k:"phone",label:"Mobile phone"}],
   consent:"I'd like to receive my results and wellness updates from Revive &amp; Glow.", require:["name"]},
  {id:"q3", type:"choice", eyebrow:"Your goal", title:"What brings you in today?", sub:"Choose what matters most right now.",
   options:[
     {id:"goal_recovery",label:"Bounce back from training &amp; sore muscles"},
     {id:"goal_inflammation",label:"Ease aches, stiffness &amp; inflammation"},
     {id:"goal_energy",label:"More energy, less fatigue"},
     {id:"goal_sleep_stress",label:"Better sleep &amp; less stress"},
     {id:"goal_longevity",label:"Age well &amp; stay ahead of it"},
     {id:"goal_skin",label:"Glowing skin &amp; natural beauty"}]},
  {id:"q4", type:"multi", max:2, optional:true, title:"Anything else you'd love to work on?", sub:"Optional — pick up to two.",
   options:[
     {id:"goal_recovery",label:"Muscle recovery"},{id:"goal_inflammation",label:"Inflammation"},
     {id:"goal_energy",label:"Energy"},{id:"goal_sleep_stress",label:"Sleep &amp; stress"},
     {id:"goal_longevity",label:"Longevity"},{id:"goal_skin",label:"Skin &amp; beauty"}], skip:"Just my main goal for now"},
  {id:"q5", type:"choice", title:"How active is your everyday life?",
   options:[{id:"act_athlete",label:"Very — I train hard / compete"},{id:"act_active",label:"Active — I move most days"},
     {id:"act_moderate",label:"Moderately active"},{id:"act_low",label:"Mostly sedentary right now"}]},
  {id:"q6", type:"choice", title:"Have you tried recovery therapies before?",
   options:[{id:"exp_regular",label:"Yes, regularly — it's part of my routine"},{id:"exp_sometimes",label:"A little — here and there"},
     {id:"exp_never",label:"No, this is all new to me"}]},
  {id:"q7", type:"choice", title:"How do you feel about cold?",
   options:[{id:"cold_love",label:"Love it / bring it on"},{id:"cold_curious",label:"Curious but nervous"},{id:"cold_avoid",label:"I'd rather ease in slowly"}]},
  {id:"safety_intro", type:"info", eyebrow:"A few quick health questions", title:"Your safety comes first.",
   body:"These help us tailor a session that's right for your body. Check anything that applies — if you're unsure, leave it and our team will guide you in person.", cta:"Continue"},
  {id:"q8", type:"multi", title:"Do any of these apply to you?", sub:"Check all that apply.", noneId:"flag_none",
   options:[
     {id:"flag_heart",label:"Heart condition or cardiovascular disease"},
     {id:"flag_bp",label:"High or unstable blood pressure"},
     {id:"flag_pregnant",label:"Pregnant or possibly pregnant"},
     {id:"flag_surgery",label:"Surgery or major injury in the last 6 weeks"},
     {id:"flag_clot",label:"History of blood clots (DVT) or circulation disorder"},
     {id:"flag_epilepsy",label:"Epilepsy or seizure disorder"},
     {id:"flag_pacemaker",label:"Pacemaker or implanted electronic device"},
     {id:"flag_cold_sensitive",label:"Raynaud's / extreme cold sensitivity"},
     {id:"flag_photo",label:"Photosensitivity or light-sensitizing medication"},
     {id:"flag_illness",label:"Feeling unwell today (fever, infection)"},
     {id:"flag_none",label:"None of these apply to me"}]},
  {id:"q9", type:"choice", title:"Has a doctor ever advised you to avoid heat, cold, or intense exercise?",
   options:[{id:"doc_yes",label:"Yes"},{id:"doc_no",label:"No"},{id:"doc_unsure",label:"Not sure"}]},
  {id:"q10", type:"choice", title:"Which age range fits you?",
   options:[{id:"age_u30",label:"Under 30"},{id:"age_30_49",label:"30–49"},{id:"age_50_64",label:"50–64"},{id:"age_65p",label:"65+"}]},
  {id:"q11", type:"info", title:"Ready to see your Revive Method™?",
   body:"These recommendations support general wellness and aren't medical advice. Our team will confirm everything with you in person.", cta:"Reveal my plan"},
  {id:"result", type:"result"}
];

/* ============ ENGINE ============ */
var state={i:0, answers:{}, screens:SCREENS};
var stageEl=document.getElementById("stage");

function humanScreens(){return SCREENS;}
function progressCount(){return SCREENS.filter(function(s){return !s.noProgress && s.type!=="result";}).length;}

function setProgress(scr){
  var pw=document.getElementById("pwrap");
  if(scr.noProgress||scr.type==="result"||scr.type==="result_pet"){pw.style.visibility="hidden";return;}
  pw.style.visibility="visible";
  var list=state.screens.filter(function(s){return !s.noProgress && s.type!=="result" && s.type!=="result_pet";});
  var pos=list.indexOf(scr)+1, total=list.length;
  document.getElementById("plbl").textContent="Step "+pos+" of "+total;
  document.getElementById("pbar").style.width=(pos/total*100)+"%";
}

function render(){
  var scr=state.screens[state.i];
  setProgress(scr);
  if(scr.type==="info") return renderInfo(scr);
  if(scr.type==="choice") return renderChoice(scr);
  if(scr.type==="multi") return renderMulti(scr);
  if(scr.type==="form") return renderForm(scr);
  if(scr.type==="result") return renderResult();
  if(scr.type==="result_pet") return renderPetResult();
}
function head(scr){
  return (scr.eyebrow?'<div class="eyebrow">'+scr.eyebrow+'</div>':'')+
         '<h1>'+scr.title+'</h1>'+
         (scr.sub?'<p class="lede">'+scr.sub+'</p>':'')+
         (scr.body?'<p class="lede">'+scr.body+'</p>':'');
}
function renderInfo(scr){
  stageEl.innerHTML='<div class="res-head">'+head(scr)+'</div>'+
    '<div class="nav">'+backBtn()+'<div class="spacer"></div><button class="btn primary" onclick="next()">'+scr.cta+' →</button></div>';
}
function renderChoice(scr){
  var cur=state.answers[scr.id];
  var html=head(scr)+'<div class="opts'+(scr.big?' two':'')+'">';
  scr.options.forEach(function(o){
    var sel=cur===o.id?' sel':'';
    html+='<button class="opt'+(scr.big?' big':'')+sel+'" onclick="pick(\''+scr.id+'\',\''+o.id+'\')">'+
      (scr.big?'<span class="ico">'+o.ico+'</span>':'<span class="dot"></span>')+'<span>'+o.label+'</span></button>';
  });
  html+='</div><div class="nav">'+backBtn()+'</div>';
  stageEl.innerHTML=html;
}
function renderMulti(scr){
  var cur=state.answers[scr.id]||[];
  var html=head(scr)+'<div class="opts">';
  scr.options.forEach(function(o){
    var sel=cur.indexOf(o.id)>=0?' sel':'';
    html+='<button class="opt multi'+sel+'" onclick="toggleMulti(\''+scr.id+'\',\''+o.id+'\')"><span class="dot"></span><span>'+o.label+'</span></button>';
  });
  html+='</div><div class="nav">'+backBtn()+'<div class="spacer"></div>';
  if(scr.skip) html+='<button class="btn ghost" onclick="setAnswer(\''+scr.id+'\',[]);next()">'+scr.skip+'</button>';
  html+='<button class="btn primary" id="mnext" onclick="next()"'+((scr.optional||cur.length)?'':' disabled')+'>Continue →</button></div>';
  stageEl.innerHTML=html;
}
function renderForm(scr){
  var cur=state.answers[scr.id]||{};
  var html=head(scr);
  scr.fields.forEach(function(f){
    html+='<div class="field"><label>'+f.label+'</label><input id="f_'+f.k+'" value="'+(cur[f.k]||"")+'" oninput="formInput(\''+scr.id+'\')" placeholder="'+f.label+'"></div>';
  });
  if(scr.consent){
    var cs=cur.consent?' sel':'';
    html+='<label class="check'+cs+'" onclick="toggleConsent(\''+scr.id+'\',this)"><span class="box"></span><span>'+scr.consent+'</span></label>';
  }
  html+='<div class="nav">'+backBtn()+'<div class="spacer"></div><button class="btn primary" id="fnext" onclick="next()">Continue →</button></div>';
  stageEl.innerHTML=html;
  formInput(scr.id);
}
function backBtn(){return state.i>0?'<button class="btn ghost" onclick="back()">← Back</button>':'';}

function pick(sid,oid){
  if(sid==="path" && oid==="path_pet") return startPet();
  state.answers[sid]=oid; render();
  setTimeout(next,180);
}
function toggleMulti(sid,oid){
  var scr=state.screens[state.i], cur=state.answers[sid]||[];
  if(scr.noneId){
    if(oid===scr.noneId){cur=[scr.noneId];}
    else{cur=cur.filter(function(x){return x!==scr.noneId;});
      var k=cur.indexOf(oid); if(k>=0)cur.splice(k,1); else cur.push(oid);}
  } else {
    var k=cur.indexOf(oid);
    if(k>=0)cur.splice(k,1);
    else{if(scr.max&&cur.length>=scr.max)cur.shift(); cur.push(oid);}
  }
  state.answers[sid]=cur; var sc=stageEl.scrollTop; render(); stageEl.scrollTop=sc;
}

function canAdvance(){
  var scr=state.screens[state.i];
  if(scr.type==="multi"&&!scr.optional) return (state.answers[scr.id]||[]).length>0;
  if(scr.type==="form") return (scr.require||[]).every(function(k){return ((state.answers[scr.id]||{})[k]||"").trim();});
  return true;
}
function next(){ if(!canAdvance())return; if(state.i<state.screens.length-1){state.i++;render();} }

/* ============ RECOMMENDATION ============ */
function compute(){
  var a=state.answers;
  var flags=(a.q8||[]).filter(function(f){return f!=="flag_none";});
  var humanReview=(a.q9==="doc_yes"||a.q9==="doc_unsure");
  // blocked modalities
  var blocked={}, review={};
  flags.forEach(function(f){
    var map=CONTRA[f]||{};
    Object.keys(map).forEach(function(m){
      if(map[m]==="block")blocked[m]=true;
      else if(map[m]==="review"&&!blocked[m])review[m]=true;
    });
  });
  var assisted=(flags.length>0)||humanReview;
  var goal=GOALS[a.q3]||GOALS.goal_recovery;
  // steps filtered by blocked modalities
  var steps=goal.steps.map(function(n){
    var m=METHOD[n];
    var avail=m.modalities.filter(function(x){return !blocked[x];});
    return {n:n, avail:avail, blocked:avail.length===0};
  }).filter(function(s){return !s.blocked;});
  // fallback: se o objetivo ficou todo bloqueado, mostra as terapias seguras que sobram
  if(steps.length===0){
    steps=[1,2,3,4,5].map(function(n){
      var m=METHOD[n];
      var avail=m.modalities.filter(function(x){return !blocked[x];});
      return {n:n, avail:avail, blocked:avail.length===0};
    }).filter(function(s){return !s.blocked;});
  }
  // pace + tier
  var pmin=goal.pace[0], pmax=goal.pace[1];
  if(a.q5==="act_athlete"){pmin++;pmax++;}
  if(a.q5==="act_low"||a.q10==="age_65p"){pmin=Math.max(1,pmin-1);pmax=Math.max(1,pmax-1);}
  var tier= goal.forceTier ? goal.forceTier : (pmax>=4?"elite":(pmax===3?"commit":"flex"));
  var pace= pmin===pmax? pmin+"x":pmin+"–"+pmax+"x";
  return {flags:flags, assisted:assisted, humanReview:humanReview, blocked:Object.keys(blocked),
          review:Object.keys(review), goal:a.q3, goalLabel:goal.label, steps:steps, support:goal.support,
          pace:pace, paceWeek:pace+"/week", tier:tier};
}

    '<p style="color:rgba(244,239,230,.82);font-size:.92rem;margin-bottom:10px">Choose your plan — we suggested the best fit for your pace ('+r.pace+' visits/week):</p><div class="tiers">';
  order.forEach(function(k){var tt=TIERS[k];var sel=state.chosenTier===k?" sel":"";
